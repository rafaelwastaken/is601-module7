name: Docker Build and Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t qr-code-generator-app .

      - name: Run container and verify output
        run: |
          docker run --name qr-generator qr-code-generator-app --url https://github.com/rafaelwastaken
          docker cp qr-generator:/app/qr_codes ./qr_codes_output
          ls -la ./qr_codes_output
          # Verify a QR code PNG was generated
          file_count=$(find ./qr_codes_output -name '*.png' | wc -l)
          if [ "$file_count" -lt 1 ]; then
            echo "ERROR: No QR code file was generated"
            exit 1
          fi
          echo "SUCCESS: Found $file_count QR code file(s)"

      - name: Show container logs
        if: always()
        run: docker logs qr-generator

      - name: Cleanup
        if: always()
        run: |
          docker rm -f qr-generator || true
